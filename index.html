<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الهدي — منصة رمضان</title>
<style>
/* ── No external fonts — use system Arabic fonts ── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:#050A14;font-family:system-ui,'Segoe UI',Tahoma,Arial,sans-serif;color:#E8EDF5;direction:rtl;font-size:14px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#D4A94A55;border-radius:2px;}
input,textarea,select,button{font-family:inherit;}
button{cursor:pointer;border:none;outline:none;transition:all .18s;}
button:hover{filter:brightness(1.1);}
button:active{transform:scale(.97);}

/* ── Colors ── */
:root{
  --bg:#050A14;--card:#0C1428;--card2:#0F1A30;--b:#1A2A45;
  --gold:#D4A94A;--g2:#F0C86A;--green:#22C55E;--red:#EF4444;
  --blue:#3B82F6;--pink:#EC4899;--txt:#E8EDF5;--mt:#4A5568;--sub:#8896A8;
}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes ring{0%{transform:scale(.9);opacity:.15;}50%{transform:scale(1.05);opacity:.4;}100%{transform:scale(.9);opacity:.15;}}
@keyframes dot{0%,100%{transform:scale(.5);opacity:.3;}50%{transform:scale(1.3);opacity:1;}}
@keyframes notifA{0%{opacity:0;transform:translateX(-50%) translateY(-18px);}15%,80%{opacity:1;transform:translateX(-50%) translateY(0);}100%{opacity:0;transform:translateX(-50%) translateY(-18px);}}
@keyframes popIn{from{transform:scale(.88);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes menuSlide{from{transform:translateY(-8px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.fu{animation:fadeIn .35s ease forwards;}
.float{animation:float 3s ease-in-out infinite;}

/* ── Inputs ── */
.inp{background:var(--card);border:1.5px solid var(--b);color:var(--txt);border-radius:10px;padding:10px 14px;width:100%;outline:none;transition:border .2s;}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px #D4A94A10;}

/* ── Buttons ── */
.btn{border-radius:10px;font-weight:700;padding:10px 18px;font-size:14px;}
.btn:hover{transform:translateY(-1px);}
.gold{background:linear-gradient(135deg,var(--gold),#8B6220);color:var(--bg);}
.outline{background:transparent;color:var(--sub);border:1px solid var(--b);}
.red-btn{background:#7f1d1d;color:#fca5a5;}
.blue-btn{background:#1e3a5f;color:#93c5fd;}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--b);border-radius:14px;padding:16px;}

/* ── Confirm / Overlay ── */
.overlay{position:fixed;inset:0;background:#000b;z-index:8000;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.pop-box{background:var(--card);border:1px solid var(--b);border-radius:18px;padding:26px;max-width:340px;width:100%;box-shadow:0 24px 64px #000c;animation:popIn .22s ease;}

/* ── Notif ── */
#notif{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9900;background:var(--card2);border:1px solid #D4A94A55;color:#fff;border-radius:14px;padding:10px 22px;font-weight:700;box-shadow:0 8px 30px #000a;white-space:nowrap;pointer-events:none;display:none;}
#notif.show{display:block;animation:notifA 3s ease forwards;}

/* ── Nav ── */
#nav{background:var(--card);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;}

/* ── Ham ── */
#hamDrop{position:absolute;top:calc(100% + 6px);left:0;min-width:190px;background:var(--card);border:1px solid var(--b);border-radius:13px;overflow:hidden;box-shadow:0 16px 40px #000c;animation:menuSlide .2s ease;z-index:500;display:none;}
#hamDrop.open{display:block;}
.hitem{width:100%;background:transparent;border:none;color:var(--txt);padding:10px 14px;text-align:right;font-size:13px;cursor:pointer;transition:background .15s;}
.hitem:hover{background:var(--card2);color:var(--gold);}

/* ── Pages ── */
.pg{display:none;max-width:940px;margin:0 auto;padding:14px 11px;}
.pg.on{display:block;}

/* ── Days grid ── */
#daysGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:9px;}
.dcard{background:var(--card);border:1px solid var(--b);border-radius:13px;padding:11px;cursor:pointer;transition:all .18s;position:relative;}
.dcard:hover{transform:translateY(-3px);box-shadow:0 8px 22px #D4A94A12;}

/* ── Task row ── */
.trow{display:flex;align-items:center;gap:11px;padding:11px 14px;cursor:pointer;transition:background .12s;border-bottom:1px solid #1A2A4533;}
.trow:hover{background:#D4A94A08;}
.trow:last-child{border-bottom:none;}

/* ── Feed ── */
.post{background:var(--card);border:1px solid var(--b);border-radius:15px;margin-bottom:11px;overflow:hidden;}
.act-bar{border-top:1px solid var(--b);display:flex;}
.act-btn{flex:1;background:transparent;color:var(--sub);border:none;padding:10px 0;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:700;cursor:pointer;transition:all .18s;}
.act-btn:hover{background:var(--card2);color:var(--gold);}
.act-btn.liked{color:var(--red);}

/* ── Progress bar ── */
.pbar-bg{background:var(--b);border-radius:4px;height:4px;flex:1;}
.pbar-fill{height:4px;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .5s ease;}

/* ── Media Upload ── */
.upload-btn{background:var(--card2);border:1px solid var(--b);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--sub);display:inline-flex;align-items:center;gap:5px;cursor:pointer;}
.upload-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ── Pill ── */
.pill{display:inline-flex;align-items:center;background:#D4A94A18;color:var(--gold);border:1px solid #D4A94A30;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;}
</style>
</head>
<body>

<div id="notif"></div>

<div id="confirmOv" class="overlay" onclick="if(event.target===this)cfNo()">
  <div class="pop-box">
    <div style="font-size:34px;text-align:center;margin-bottom:10px">⚠️</div>
    <div id="cfMsg" style="font-size:15px;font-weight:700;text-align:center;margin-bottom:18px;line-height:1.6;color:var(--txt)"></div>

      <button onclick="cfNo()"  class="btn outline" style="flex:1;padding:11px 0">لا، إلغاء</button>
      <button onclick="cfYes()" class="btn red-btn" style="flex:1;padding:11px 0">نعم، تأكيد</button>

  </div>
</div>

<div id="shareOv" class="overlay" onclick="if(event.target===this)closeShare()">

    <div style="font-weight:900;color:var(--gold);font-size:17px;margin-bottom:14px">↗️ مشاركة المنشور</div>

    <div style="display:flex;flex-direction:column;gap:9px">

      <button onclick="closeShare()" class="btn outline" style="padding:11px 0;font-size:14px">إغلاق</button>

</div>

<nav id="nav" style="display:none">
  <div style="display:flex;align-items:center;gap:9px;cursor:pointer" onclick="go('home')">
    <svg width="26" height="26" viewBox="0 0 100 100" fill="none">
      <path d="M50 10 A40 40 0 1 0 90 50 A28 28 0 1 1 50 10Z" fill="#D4A94A" opacity=".92"/>
      <polygon points="38,38 40.5,46 48,46 42,50.5 44.5,58.5 38,54 31.5,58.5 34,50.5 28,46 35.5,46" fill="#F0C86A" opacity=".9"/>
    </svg>
    <div>
      <div style="font-weight:900;font-size:17px;color:var(--gold);letter-spacing:2px">الهدي</div>
      <div style="font-size:8px;color:var(--mt);letter-spacing:3px">AL-HADI</div>
    </div>
  </div>
  <div style="position:relative" id="hamWrap">
    <button id="hamBtn" onclick="toggleHam()" style="background:transparent;border:1px solid var(--b);color:var(--sub);width:38px;height:38px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0">
      <span class="hb" style="display:block;width:16px;height:2px;background:currentColor;border-radius:2px;transition:all .22s"></span>
      <span class="hb" style="display:block;width:16px;height:2px;background:currentColor;border-radius:2px;transition:all .22s"></span>
      <span class="hb" style="display:block;width:16px;height:2px;background:currentColor;border-radius:2px;transition:all .22s"></span>
    </button>
    <div id="hamDrop">
      <div id="hamUser" style="padding:11px 13px;background:var(--card2);border-bottom:1px solid var(--b);display:flex;gap:9px;align-items:center"></div>
      <button class="hitem" onclick="goHam('home')"   >🏠 الرئيسية</button>
      <button class="hitem" onclick="goHam('forum')"  >💬 المجتمع</button>
      <button class="hitem" onclick="goHam('profile')">👤 ملفي الشخصي</button>
      <button id="adminBtn" class="hitem" onclick="goHam('admin')" style="display:none">🛡️ لوحة الإدارة</button>
      <button class="hitem" style="color:var(--red)" onclick="closeHam();confirm2('هل أنت متأكد من تسجيل الخروج؟',doLogout)">🚪 تسجيل الخروج</button>
    </div>
  </div>
</nav>

<div class="pg on" id="pg-auth" style="max-width:420px">
  <div style="text-align:center;margin-bottom:24px;padding-top:36px">
    <div class="float" style="display:inline-block;margin-bottom:10px">
      <svg width="66" height="66" viewBox="0 0 100 100" fill="none">
        <path d="M50 10 A40 40 0 1 0 90 50 A28 28 0 1 1 50 10Z" fill="#D4A94A" opacity=".92"/>
        <polygon points="68,16 70,22 76,22 71,26 73,32 68,28 63,32 65,26 60,22 66,22" fill="#F0C86A"/>
        <polygon points="38,38 40.5,46 48,46 42,50.5 44.5,58.5 38,54 31.5,58.5 34,50.5 28,46 35.5,46" fill="#F0C86A" opacity=".9"/>
      </svg>
    </div>
    <div style="font-size:36px;font-weight:900;color:var(--gold);letter-spacing:3px">الهدي</div>
    <div style="color:var(--mt);font-size:10px;letter-spacing:4px;margin-top:2px">AL-HADI</div>

  </div>
  <div class="card" style="border-radius:20px;padding:24px">
    <div style="display:flex;background:var(--bg);border-radius:11px;padding:3px;margin-bottom:18px;gap:3px">
      <button id="tLogin" onclick="authTab('login')" style="flex:1;padding:9px 0;border-radius:9px;background:var(--gold);color:var(--bg);font-size:14px;font-weight:700">تسجيل الدخول</button>
      <button id="tReg"   onclick="authTab('reg')"   style="flex:1;padding:9px 0;border-radius:9px;background:transparent;color:var(--mt);font-size:14px;font-weight:700">حساب جديد</button>
    </div>
    <div id="authErr" style="display:none;background:#7f1d1d22;border:1px solid #EF444444;color:#fca5a5;border-radius:9px;padding:9px 13px;margin-bottom:13px;font-size:13px"></div>
    <div id="fLogin" style="display:flex;flex-direction:column;gap:12px">
      <div><label style="color:var(--sub);font-size:12px;display:block;margin-bottom:4px">البريد الإلكتروني</label><input class="inp" id="lEmail" type="email" placeholder="example@mail.com"/></div>
      <div><label style="color:var(--sub);font-size:12px;display:block;margin-bottom:4px">كلمة المرور</label><input class="inp" id="lPw" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button onclick="doLogin()" class="btn gold" style="padding:12px 0;font-size:15px;margin-top:3px">دخول</button>
    </div>
    <div id="fReg" style="display:none;flex-direction:column;gap:11px">
      <div><label style="color:var(--sub);font-size:12px;display:block;margin-bottom:4px">الاسم الكامل *</label><input class="inp" id="rName" placeholder="محمد أحمد"/></div>
      <div><label style="color:var(--sub);font-size:12px;display:block;margin-bottom:4px">البريد الإلكتروني *</label><input class="inp" id="rEmail" type="email" placeholder="example@mail.com"/></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">
        <div><label style="color:var(--sub);font-size:12px;display:block;margin-bottom:4px">رقم الهاتف</label><input class="inp" id="rPhone" placeholder="05x"/></div>
        <div><label style="color:var(--sub);font-size:12px;display:block;margin-bottom:4px">العمر</label><input class="inp" id="rAge" type="number" placeholder="20"/></div>

      <button onclick="doReg()" class="btn gold" style="padding:12px 0;font-size:15px;margin-top:3px">إنشاء الحساب</button>
    </div>
  </div>
</div>

<div class="pg" id="pg-home">
  <div class="card fu" style="border-radius:18px;padding:20px;margin-bottom:16px;background:linear-gradient(135deg,var(--card2),var(--card));position:relative;overflow:hidden">
    <div style="position:absolute;top:-40px;left:-40px;width:160px;height:160px;background:var(--gold);opacity:.04;border-radius:50%;pointer-events:none"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:13px">

        <div style="color:var(--gold);font-size:11px;letter-spacing:2px;margin-bottom:3px">أهلاً وسهلاً</div>

</div>

</div>

<div class="pg" id="pg-admin" style="max-width:600px">

    <h3 style="color:var(--gold);margin-bottom:12px">🛡️ لوحة التحكم بالإدارة</h3>

    <button onclick="confirm2('هل أنت متأكد من تصفير كافة بيانات المستخدمين والمنشورات؟', resetSystem)" class="btn red-btn" style="width:100%">🚨 إعادة تعيين المنصة وتصفير البيانات</button>
  </div>
</div>

<script>
// البيانات الافتراضية للمهام الرمضانية (30 يوم)
const TASKS_TEMPLATE = [
  { id: 't1', cat: 'صلوات', text: 'المحافظة على الصلوات الخمس في وقتها' },
  { id: 't2', cat: 'صلوات', text: 'صلاة التراويح والقيام' },
  { id: 't3', cat: 'قرآن', text: 'قراءة ورد القرآن اليومي بتدبر' },
  { id: 't4', cat: 'أذكار', text: 'أذكار الصباح والمساء والاستغفار' },
  { id: 't5', cat: 'إحسان', text: 'صدقة اليوم أو تفطير صائم' },
  { id: 't6', cat: 'عادات', text: 'تجنب الغيبة، النميمة، وضياع الوقت' }
];

// الحالة البرمجية للتطبيق (State)
let state = {
  user: null,
  progress: {}, // { dayIndex: { taskId: true/false } }
  posts: [],
  activeDay: 0,
  activeCat: 'الكل'
};

// دالة تأكيد مخصصة بديلة للـ confirm التقليدية
let cfAction = null;
function confirm2(msg, action) {
  document.getElementById('cfMsg').innerText = msg;
  document.getElementById('confirmOv').classList.add('open');
  cfAction = action;
}
